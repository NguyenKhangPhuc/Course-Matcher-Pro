name: Production CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ==========================================
  # STAGE 1: PARALLEL VERIFICATION
  # ==========================================

  lint:
    # Purpose: Validates code formatting and syntax standards.
    # Rationale: Prevents poorly formatted or syntactically incorrect code from consuming build resources.
    # Dependencies: None. Runs immediately in parallel with other verification jobs.
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Execute Linter
        run: npm run lint

  unit-test:
    # Purpose: Executes low-level isolated function tests.
    # Rationale: Ensures that the core business logic remains unbroken by recent changes.
    # Dependencies: None. Runs immediately in parallel with other verification jobs.
    name: Unit Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Execute Unit Tests
        run: npm run test

  playwright-test:
    # Purpose: Runs end-to-end browser automation tests.
    # Rationale: Verifies user registration, login, and dashboard search workflows against a real local Supabase database.
    # Dependencies: None. Runs immediately in parallel with other verification jobs.
    name: Playwright E2E Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase Local Instances
        run: |
          npx supabase start
          # Dynamically extract local URL and key supporting both old and new Supabase CLI output formats
          status_output=$(npx supabase status)
          if echo "$status_output" | grep -q "Project URL"; then
            api_url=$(echo "$status_output" | grep "Project URL" | awk -F '│' '{print $3}' | xargs)
            anon_key=$(echo "$status_output" | grep "Publishable" | awk -F '│' '{print $3}' | xargs)
          else
            api_url=$(echo "$status_output" | grep "API URL:" | awk '{print $3}')
            anon_key=$(echo "$status_output" | grep "anon key:" | awk '{print $3}')
          fi
          echo "NEXT_PUBLIC_SUPABASE_URL=$api_url" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$anon_key" >> $GITHUB_ENV

      - name: Execute Playwright E2E Tests
        run: npm run e2e
        env:
          # Inject keys into Playwright runtime env
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ==========================================
  # STAGE 2: SEQUENTIAL ARTIFACT CREATION
  # ==========================================

  build:
    # Purpose: Compiles source code and aggregates production assets.
    # Rationale: Ensures that compile-time checks pass, and packages the app only after code is proven clean and functional.
    # Dependencies: Requires successful execution of lint, unit-test, and playwright-test jobs.
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint, unit-test, playwright-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Code
        run: npm run build
        env:
          # Next.js build requires these variables to be defined, using placeholder credentials
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'placeholder' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'placeholder' }}
  # ==========================================
  # STAGE 3: DEPLOYMENT
  # ==========================================

  deploy:
    # Purpose: Transfers built production artifacts into the hosting environment.
    # Rationale: Ships the verified code to the target server safely once it passes the build phase.
    # Dependencies: Requires successful execution of the build job.
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push Database Migrations to Supabase
        run: npx supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Project Info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Debug env
        run: echo "Key length is ${#OPENAI_API_KEY}"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_AUTH_EXTERNAL_GITHUB_CLIENT: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GITHUB_CLIENT }}
          SUPABASE_AUTH_EXTERNAL_GITHUB_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GITHUB_SECRET }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          
      - name: Deploy Project to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ==========================================
  # STAGE 4: VERSIONING & RELEASE
  # ==========================================

  create-version:
    # Purpose: Automatically generates a semantic Git tag and publishes a release.
    # Rationale: Creates a permanent, traceable historical marker matching the code currently running in production.
    # Dependencies: Requires successful execution of the deploy job.
    name: Auto-Versioning & Release
    needs: [deploy]
    if: ${{ github.event_name == 'push' && !contains(github.event.head_commit.message, '#skip') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: '0'
    - name: Bump version and push tag
      uses: anothrNick/github-tag-action@8c8163ef62cf9c4677c8e800f36270af27930f42 # Don't use @master or @v1 unless you're happy to test the latest version
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }} # if you don't want to set write permissions use a PAT token
        WITH_V: false
        DEFAULT_BUMP: patch
      
